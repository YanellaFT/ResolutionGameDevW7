<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResolutionGameDevW7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <canvas id="gameCanvas"></canvas>

        <div class="screen" id="home_screen">
            <div class="title">Snow Catcher - ResolutionGameDevW7</div>

        </div>

        <div class="screen" id="lose_screen">

            <div id="final_score"></div>
            <button class="btn" id="replay_btn"> Play Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
